version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: nutriagent-db
    environment:
      POSTGRES_DB: nutriagent
      POSTGRES_USER: nutriagent
      POSTGRES_PASSWORD: nutriagent123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutriagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nutriagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
